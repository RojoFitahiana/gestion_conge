
      <div class="card my-0">
        <div class="card-body">
          <div class="row">
            <div class="d-flex justify-content-center">
              <div class="auth-header">
                <h2 class="text-secondary mt-3 mb-4"><b>{{ data.id ? 'Modifier un employé' : 'Ajouter un nouvel employé' }}</b></h2>
              </div>
            </div>
          </div>
          <form [formGroup]="employeeForm" class="employee-form">
            <!-- Ligne 1 : Nom et Prénom -->
            <div class="form-row">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nom" formControlName="nom" required />
                <label for="nom">Nom</label>

              </div>

              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="prenom" formControlName="prenom" required />
                <label for="prenom">Prénom</label>
              </div>
            </div>

            <!-- Ligne 2 : Email et Genre -->
            <div class="form-row">
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" formControlName="email" required />
                <label for="email">Email</label>
      
              </div>

              <div id="unique-container" class="form-floating mb-3">
                <mat-select class="form-control" id="genre" formControlName="genre" required panelClass="custom-select-panel">
                  <mat-option value="Homme">Homme</mat-option>
                  <mat-option value="Femme">Femme</mat-option>
                </mat-select>
                <label for="genre">Genre</label>
              </div>
            </div>

            <!-- Ligne 3 : Date de Naissance et Date d'Embauche -->
            <div class="form-row">
              <div class="form-floating mb-3">
                <input type="date" class="form-control" id="date_naissance" formControlName="date_naissance" required />
                <label for="date_naissance">Date de Naissance</label>
              </div>

              <div class="form-floating mb-3">
                <input type="date" class="form-control" id="date_embauche" formControlName="date_embauche" required />
                <label for="date_embauche">Date d'Embauche</label>
              </div>
            </div>

            <!-- Ligne 4 : Poste et Département -->
            <div class="form-row">
              <div class="form-floating mb-3">
                <mat-select class="form-control" id="departement" formControlName="departement" required>
                  <mat-option *ngFor="let department of departments$ | async" [value]="department.id">
                    {{ department.nom_departement }}
                  </mat-option>
                </mat-select>
                <label for="departement">Département</label>
              </div>
              
              <div class="form-floating mb-3">
                <mat-select class="form-control" id="jobFunction" formControlName="jobFunction" required [disabled]="!isDepartmentSelected">
                  <mat-option *ngFor="let jobFunction of jobFunctions" [value]="jobFunction.id">
                    {{ jobFunction.name }}
                  </mat-option>
                </mat-select>
                <label for="jobFunction">Poste</label>
              </div>
            </div>

            <!-- Bouton de soumission -->
            <div class="d-grid mt-4">
              <button type="button" class="btn btn-secondary" (click)="onSubmit()" [disabled]="employeeForm.invalid">
                {{ data.id ? 'Modifier' : 'Ajouter' }}
              </button>
            </div>
          </form>
          <hr />
        </div>
      </div>
