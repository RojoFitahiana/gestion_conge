<!-- Formulaire de création -->
<!-- Formulaire avec mise en page en deux colonnes -->
<div class="nouvelle-demande-container">
    <h2>Nouvelle demande</h2>
    
    <div class="form-row">
      <!-- Première colonne -->
      <div class="form-group">
        <label for="dateDebut">Date de début</label>
        <input 
          type="date" 
          id="dateDebut"
          name="date_debut" 
          [(ngModel)]="nouvelleDemande.date_debut"
          class="form-control"
          required
        >
      </div>
      
      <!-- Deuxième colonne -->
      <div class="form-group">
        <label for="dateFin">Date de fin</label>
        <input 
          type="date" 
          id="dateFin"
          name="date_fin"
          [(ngModel)]="nouvelleDemande.date_fin"
          class="form-control"
          required
        >
      </div>
    </div>
  
    <div class="form-row">
      <!-- Première colonne -->
      <div class="form-group">
        <label for="typeConge">Type de congé</label>
        <select 
          id="typeConge"
          name="type_conge_id"
          [(ngModel)]="nouvelleDemande.type_conge_id"
          class="form-control"
          required
        >
          <option value="">Sélectionnez...</option>
          <option 
            *ngFor="let type of leaveTypes" 
            [value]="type.id"
          >
            {{ type.name }}
          </option>
        </select>
      </div>
      
      <!-- Deuxième colonne -->
      <div class="form-group">
        <label for="commentaire">Commentaire</label>
        <textarea 
          id="commentaire"
          name="commentaire"
          [(ngModel)]="nouvelleDemande.commentaire"
          class="form-control"
          rows="3"
        ></textarea>
      </div>
    </div>
  
    <button 
      class="btn-submit" 
      (click)="submitDemande()"
      [disabled]="isLoading"
    >
      <span *ngIf="!isLoading">Soumettre</span>
      <span *ngIf="isLoading">En cours...</span>
    </button>
  </div>

  
  <!-- Liste des demandes -->
  <div class="demandes-container">
    <h2>Mes demandes</h2>
  
    <!-- Indicateur de chargement -->
    <div *ngIf="isLoading" class="loading-message">
      Chargement des demandes...
    </div>
  
    <!-- Liste vide -->
    <div *ngIf="!isLoading && demandes.length === 0" class="empty-message">
      Aucune demande trouvée
    </div>
  
    <!-- Liste des demandes -->
    <div *ngFor="let demande of demandes" class="demande-card">
      <div class="header">
        <h3>{{ demande.type_conge?.name }}</h3>
      </div>
      
      <div class="dates">
        <div class="date-item">
          <strong>Début :</strong> {{ formatDate(demande.date_debut) }}
        </div>
        <div class="date-item">
          <strong>Fin :</strong> {{ formatDate(demande.date_fin) }}
        </div>
      </div>
  
      <div class="commentaire" *ngIf="demande.commentaire">
        <strong>Commentaire :</strong> {{ demande.commentaire }}
      </div>
  
      <div class="footer">
        <small>Soumis le {{ formatDate(demande.date_soumission) }}</small>
      </div>
    </div>
  </div>
